name: ecommerce-platform

services:
  # --- API Gateway ---
  api-gateway:
    build:
      context: .
      dockerfile: ./services/ApiGateway/docker/Dockerfile.dev
    container_name: api_gateway_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/tmp
    environment:
      - APP_PORT=8000
      - APP_ENV=development
      - INTERNAL_AUTH_TOKEN=dev-internal-token
      - JWT_SECRET=your-secret-key
      - USER_SERVICE_URL=user-service:50051
      - PRODUCT_SERVICE_URL=product-service:50053
      - CART_SERVICE_URL=cart-service:50057
      - ORDER_SERVICE_URL=order-service:50055
    networks:
      - ecommerce_network

  # --- User Service ---
  user-service:
    build:
      context: .
      dockerfile: ./services/UserService/docker/Dockerfile.dev
    container_name: user_service_app
    volumes:
      - .:/app
      - /app/tmp
    environment:
      - DB_DRIVER=postgres
      - DB_DSN=host=user-db user=postgres password=postgres dbname=ecommerce port=5432 sslmode=disable
      - DB_MIGRATION_AUTO_RUN=true
      - APP_PORT=8081
      - GRPC_PORT=50051
      - INTERNAL_AUTH_TOKEN=dev-internal-token
      - JWT_SECRET=your-secret-key
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - ecommerce_network

  user-db:
    image: postgres:16-alpine
    container_name: user_service_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks:
      - ecommerce_network

  # --- Product Service ---
  product-service:
    build:
      context: .
      dockerfile: services/ProductService/docker/Dockerfile.dev
    container_name: product_service_app
    volumes:
      - .:/app
    environment:
      - INTERNAL_AUTH_TOKEN=dev-internal-token
      - JWT_SECRET=your-secret-key
      - DB_DSN=host=product-db user=postgres password=postgres dbname=products port=5432 sslmode=disable
      - DB_DRIVER=postgres
      - GRPC_PORT=50053
      - DB_MIGRATION_AUTO_RUN=true
      - REDIS_HOST=product-redis
      - REDIS_PORT=6379
      - ENABLE_CACHE=true
    depends_on:
      product-db:
        condition: service_healthy
      product-redis:
        condition: service_healthy
    networks:
      - ecommerce_network

  product-db:
    image: postgres:16-alpine
    container_name: product_service_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: products
    volumes:
      - product_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d products"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  product-redis:
    image: redis:7-alpine
    container_name: product_service_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
    networks:
      - ecommerce_network

  # --- Cart Service ---
  cart-service:
    build:
      context: .
      dockerfile: ./services/CartService/docker/Dockerfile.dev
    container_name: cart_service_app
    volumes:
      - .:/app
      - /app/tmp
    environment:
      # Changed to match the redis service name below
      - REDIS_ADDR=cart-redis:6379 
      - REDIS_HOST=cart-redis
      - REDIS_PORT=6379
      - APP_PORT=8082
      - GRPC_PORT=50057
      - USER_SERVICE_GRPC_ADDR=user-service:50051
      - PRODUCT_SERVICE_GRPC_ADDR=product-service:50053
      - INTERNAL_AUTH_TOKEN=dev-internal-token
      - JWT_SECRET=your-secret-key
    depends_on:
      cart-redis:
        condition: service_healthy
    networks:
      - ecommerce_network

  cart-redis:
    image: redis:7-alpine
    container_name: cart_service_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce_network

  # --- Order Service ---
  order-service:
    build:
      context: .
      dockerfile: ./services/OrderService/docker/Dockerfile.dev
    container_name: order_service_app
    volumes:
      - .:/app
      - /app/tmp
    environment:
      - DB_DSN=host=order-db user=postgres password=postgres dbname=orders port=5432 sslmode=disable
      - APP_PORT=8085
      - GRPC_PORT=50055
      - PRODUCT_SERVICE_GRPC_ADDR=product-service:50053
      - USER_SERVICE_GRPC_ADDR=user-service:50051
      - INTERNAL_AUTH_TOKEN=dev-internal-token
      - JWT_SECRET=your-secret-key
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - ecommerce_network

  order-db:
    image: postgres:16-alpine
    container_name: order_service_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
    networks:
      - ecommerce_network

networks:
  ecommerce_network:
    driver: bridge

volumes:
  user_db_data:
  product_db_data:
  order_db_data: