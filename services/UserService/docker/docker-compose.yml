name: userservice

services:
  app:
    build:
      context: ../../..
      dockerfile: ./services/UserService/docker/Dockerfile.dev
    container_name: user_service_app
    volumes:
      - ../../..:/app
      - /app/tmp
    environment:
      - DB_DRIVER=postgres
      - DB_DSN=host=db user=postgres password=postgres dbname=ecommerce port=5432 sslmode=disable TimeZone=UTC
      - DB_MIGRATION_AUTO_RUN=true
      
      - APP_PORT=8081
      - GRPC_PORT=50051
      - APP_ENV=development
      
      - INTERNAL_AUTH_TOKEN=${INTERNAL_AUTH_TOKEN:-dev-internal-token}
      - SERVICE_NAME=user-service
      
      - JAEGER_ENDPOINT=ecommerce-jaeger:4317
    ports:
      - "50051:50051"
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - user_service_network
      - ecommerce_default

  db:
    image: postgres:16-alpine
    container_name: user_service_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - user_service_network

volumes:
  db_data:

networks:
  user_service_network:
    driver: bridge
  ecommerce_default:
    external: true