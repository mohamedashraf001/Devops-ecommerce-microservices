apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: product-postgres
  namespace: ecommerce
spec:
  serviceName: product-postgres
  replicas: 1

  selector:
    matchLabels:
      app: product-postgres

  template:
    metadata:
      labels:
        app: product-postgres

    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine

          env:
            - name: POSTGRES_DB
              value: products
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres

          ports:
            - containerPort: 5432

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi